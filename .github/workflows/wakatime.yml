name: Update Stats
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update README
        run: echo "Last updated: $(date)" >> README.md
      - uses: stefanzweifel/git-auto-commit-action@v5
